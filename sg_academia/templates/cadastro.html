{% extends "base.html" %}
{% set active = "cadastro" %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">👤 Cadastro de Aluno</h1>
</div>

<div class="form-card">
  <div id="alert" class="alert" style="display:none"></div>
  <div class="form-grid">
    <div class="form-group span2">
      <label>Nome Completo *</label>
      <input type="text" id="nome" placeholder="Nome completo do aluno"/>
    </div>
    <div class="form-group">
      <label>E-mail *</label>
      <input type="email" id="email" placeholder="email@exemplo.com"/>
    </div>
    <div class="form-group">
      <label>CPF *</label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)"/>
    </div>
    <div class="form-group">
      <label>Plano Inicial *</label>
      <select id="plano" onchange="atualizarValor()">
        <option value="Teste 1 Dia">Teste 1 Dia — Grátis</option>
        <option value="Teste 1 Semana">Teste 1 Semana — Grátis</option>
        <option value="Mensal" selected>Mensal — R$ 89,90</option>
        <option value="Bimestral">Bimestral — R$ 159,90</option>
        <option value="Semestral">Semestral — R$ 399,90</option>
        <option value="Anual">Anual — R$ 699,90</option>
      </select>
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input type="text" id="telefone" placeholder="(11) 99999-0000"/>
    </div>
    <div class="form-group">
      <label>Data de Nascimento *</label>
      <input type="date" id="nascimento"/>
    </div>
    <div class="form-group">
      <label>Gênero</label>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="genero" value="Feminino" checked/> Feminino</label>
        <label class="radio-label"><input type="radio" name="genero" value="Masculino"/> Masculino</label>
        <label class="radio-label"><input type="radio" name="genero" value="Outro"/> Outro</label>
      </div>
    </div>
    <div class="form-group">
      <label>Valor do Plano</label>
      <div class="valor-box" id="valor-box">R$ 89,90 / Mensal</div>
    </div>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary" onclick="salvar()">✔ Salvar Cadastro</button>
    <button class="btn btn-secondary" onclick="limpar()">✕ Limpar Campos</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  var VALORES = {
    "Teste 1 Dia":    "Grátis / 1 dia",
    "Teste 1 Semana": "Grátis / 1 semana",
    "Mensal":        "R$ 89,90 / Mensal",
    "Bimestral":     "R$ 159,90 / Bimestral",
    "Semestral":     "R$ 399,90 / Semestral",
    "Anual":         "R$ 699,90 / Anual"
  };

  function atualizarValor() {
    var plano = document.getElementById("plano").value;
    document.getElementById("valor-box").textContent = VALORES[plano] || "—";
  }

  function maskCPF(el) {
    var v = el.value.replace(/\D/g,"").slice(0,11);
    v = v.replace(/(\d{3})(\d)/,"$1.$2");
    v = v.replace(/(\d{3})\.(\d{3})(\d)/,"$1.$2.$3");
    v = v.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/,"$1.$2.$3-$4");
    el.value = v;
  }

  function showAlert(msg, tipo) {
    var el = document.getElementById("alert");
    el.textContent = msg; el.className = "alert alert-"+tipo; el.style.display = "block";
    setTimeout(function(){ el.style.display="none"; }, 5000);
  }

  async function salvar() {
    var nome     = document.getElementById("nome").value.trim();
    var email    = document.getElementById("email").value.trim();
    var cpf      = document.getElementById("cpf").value.trim();
    var plano    = document.getElementById("plano").value;
    var telefone = document.getElementById("telefone").value.trim();
    var nasc     = document.getElementById("nascimento").value;
    var genEl    = document.querySelector("input[name=genero]:checked");
    var genero   = genEl ? genEl.value : "Outro";

    if (!nome || !email || !cpf || !nasc) {
      showAlert("Preencha todos os campos obrigatórios (*).", "error"); return;
    }
    if (cpf.replace(/\D/g,"").length !== 11) {
      showAlert("CPF inválido — deve ter 11 dígitos.", "error"); return;
    }
    var res  = await fetch("/api/cadastrar", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome:nome, email:email, cpf:cpf, plano:plano, telefone:telefone, nascimento:nasc, genero:genero })
    });
    var data = await res.json();
    if (data.ok) { showAlert(data.msg, "success"); limpar(); }
    else showAlert(data.msg, "error");
  }

  function limpar() {
    ["nome","email","cpf","telefone"].forEach(function(id){ document.getElementById(id).value=""; });
    document.getElementById("nascimento").value = "";
    document.getElementById("plano").value = "Mensal";
    document.querySelector("input[name=genero][value=Feminino]").checked = true;
    atualizarValor();
  }
</script>
{% endblock %}
